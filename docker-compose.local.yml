services:
  mind:
    platform: linux/amd64
    build:
      context: ./mind
      dockerfile: Dockerfile
    ports:
      - "5020:5020"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SERVICE_URL=http://service:5000
    volumes:
      - ./mind-data:/data
      - ./service/data/shapefiles:/data/shapefiles:ro
    depends_on:
      - service

  service:
    platform: linux/amd64
    build:
      context: ./service
      dockerfile: Dockerfile.local
      labels:
        git_url: ${GIT_URL}
        version: ${VERSION}
        maintainer: IDM
    ports:
      - "5000:5000"

    environment:
      - "FLASK_ENV=staging"

  client:
    platform: linux/amd64
    build:
      context: ./client
      dockerfile: Dockerfile.local
      labels:
        git_url: ${GIT_URL}
        version: ${VERSION}
        maintainer: IDM
      args:
        - "GENERATE_SOURCEMAP=true"
    ports:
      - "8080:80"
    depends_on:
      - service
      - llm
      - mind
    environment:
      - REACT_APP_SERVICE=service

  mcp:
    platform: linux/amd64
    # To build on mac:
    # platform: linux/arm64
    # image: ${MCP_IMAGE}:${VERSION}
    build:
      context: ./service
      dockerfile: Dockerfile.mcp
      labels:
        git_url: ${GIT_URL}
        version: ${VERSION}
        maintainer: IDM
    ports:
      - "5010:5010"
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=5010
    # volumes:
    #   - /mnt/SAEDashboard-Data:/app/service/data
    depends_on:
      - service

  llm:
    platform: linux/amd64
    # image: ${LLM_IMAGE}:${VERSION}
    build:
      context: ./LLM
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
#      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=-1
      - OLLAMA_KV_CACHE_TYPE=q8_0
      - MCP_SERVER_URL=http://mcp:5010/sse
      - MCP_SERVER_ENABLED=true
      - DATABRICKS_API_BASE=${DATABRICKS_API_BASE}
#    volumes:
#      - ./ollama_models:/root/.ollama
    depends_on:
      - mcp