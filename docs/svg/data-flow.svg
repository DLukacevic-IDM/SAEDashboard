<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" font-family="Arial, sans-serif" font-size="12">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#f8f9fa" rx="8"/>
  <text x="440" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#333">Data Flow — Sources to Visualization</text>

  <!-- External Sources -->
  <rect x="30" y="55" width="820" height="75" rx="6" fill="#fff8e1" stroke="#f9a825" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="440" y="73" text-anchor="middle" font-weight="bold" fill="#f57f17" font-size="11">EXTERNAL SOURCES</text>

  <rect x="50" y="85" width="170" height="35" rx="4" fill="#fff3e0" stroke="#e65100"/>
  <text x="135" y="107" text-anchor="middle" fill="#333">IDM Spatial Models</text>

  <rect x="250" y="85" width="170" height="35" rx="4" fill="#fff3e0" stroke="#e65100"/>
  <text x="335" y="107" text-anchor="middle" fill="#333">DHS Survey Data</text>

  <rect x="450" y="85" width="170" height="35" rx="4" fill="#fff3e0" stroke="#e65100"/>
  <text x="535" y="107" text-anchor="middle" fill="#333">GADM v4.1 (gadm.org)</text>

  <rect x="650" y="85" width="170" height="35" rx="4" fill="#fff3e0" stroke="#e65100"/>
  <text x="735" y="107" text-anchor="middle" fill="#333">PDF Reports</text>

  <!-- Offline Preparation -->
  <rect x="30" y="150" width="660" height="65" rx="6" fill="#e8eaf6" stroke="#3f51b5" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="360" y="168" text-anchor="middle" font-weight="bold" fill="#283593" font-size="11">OFFLINE PREPARATION</text>

  <rect x="50" y="178" width="200" height="30" rx="4" fill="#c5cae9" stroke="#3f51b5"/>
  <text x="150" y="198" text-anchor="middle" fill="#1a237e" font-size="11">indicator_data_converter.py</text>

  <rect x="280" y="178" width="180" height="30" rx="4" fill="#c5cae9" stroke="#3f51b5"/>
  <text x="370" y="198" text-anchor="middle" fill="#1a237e" font-size="11">downloadGeoJson.sh</text>

  <rect x="490" y="178" width="190" height="30" rx="4" fill="#c5cae9" stroke="#3f51b5"/>
  <text x="585" y="198" text-anchor="middle" fill="#1a237e" font-size="11">gadm_geojson_converter.py</text>

  <!-- Arrows: Sources → Prep -->
  <line x1="135" y1="120" x2="150" y2="176" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="335" y1="120" x2="150" y2="176" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="535" y1="120" x2="370" y2="176" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="535" y1="120" x2="585" y2="176" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Data Store -->
  <rect x="30" y="240" width="820" height="65" rx="6" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="440" y="258" text-anchor="middle" font-weight="bold" fill="#1b5e20" font-size="11">DATA STORE (service/data/)</text>

  <rect x="50" y="268" width="180" height="28" rx="4" fill="#c8e6c9" stroke="#2e7d32"/>
  <text x="140" y="287" text-anchor="middle" fill="#1b5e20" font-size="11">CSV: Country__Ind__Sub__V.csv</text>

  <rect x="250" y="268" width="180" height="28" rx="4" fill="#c8e6c9" stroke="#2e7d32"/>
  <text x="340" y="287" text-anchor="middle" fill="#1b5e20" font-size="11">Shapefiles: *.shp.pickle</text>

  <rect x="450" y="268" width="120" height="28" rx="4" fill="#c8e6c9" stroke="#2e7d32"/>
  <text x="510" y="287" text-anchor="middle" fill="#1b5e20" font-size="11">events.csv</text>

  <rect x="590" y="268" width="120" height="28" rx="4" fill="#c8e6c9" stroke="#2e7d32"/>
  <text x="650" y="287" text-anchor="middle" fill="#1b5e20" font-size="11">layer_data.json</text>

  <rect x="730" y="268" width="100" height="28" rx="4" fill="#f3e5f5" stroke="#7b1fa2"/>
  <text x="780" y="287" text-anchor="middle" fill="#4a148c" font-size="11">ChromaDB</text>

  <!-- Arrows: Prep → Store -->
  <line x1="150" y1="208" x2="140" y2="266" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="480" y1="208" x2="340" y2="266" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="735" y1="120" x2="780" y2="266" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Runtime Services -->
  <rect x="30" y="330" width="820" height="60" rx="6" fill="#e1f5fe" stroke="#0277bd" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="440" y="348" text-anchor="middle" font-weight="bold" fill="#01579b" font-size="11">RUNTIME SERVICES</text>

  <rect x="50" y="356" width="220" height="28" rx="4" fill="#b3e5fc" stroke="#0277bd"/>
  <text x="160" y="375" text-anchor="middle" fill="#01579b" font-size="11">Service API :5000 (open_data_file → cache)</text>

  <rect x="290" y="356" width="180" height="28" rx="4" fill="#ffe0b2" stroke="#e65100"/>
  <text x="380" y="375" text-anchor="middle" fill="#bf360c" font-size="11">MCP :5010 (DuckDB → CSV)</text>

  <rect x="490" y="356" width="180" height="28" rx="4" fill="#e1bee7" stroke="#7b1fa2"/>
  <text x="580" y="375" text-anchor="middle" fill="#4a148c" font-size="11">LLM :5001 (Agent → MCP/RAG)</text>

  <!-- Arrows: Store → Services -->
  <line x1="140" y1="296" x2="160" y2="354" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="340" y1="296" x2="160" y2="354" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="140" y1="296" x2="380" y2="354" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="780" y1="296" x2="580" y2="354" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Frontend -->
  <rect x="200" y="420" width="480" height="45" rx="6" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <text x="440" y="448" text-anchor="middle" font-weight="bold" fill="#0d47a1">Frontend — Choropleth Maps, Charts, AI Chat</text>

  <!-- Arrows: Services → Frontend -->
  <line x1="160" y1="384" x2="350" y2="418" stroke="#0277bd" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="220" y="402" fill="#0277bd" font-size="10">/api</text>
  <line x1="580" y1="384" x2="530" y2="418" stroke="#7b1fa2" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="570" y="402" fill="#7b1fa2" font-size="10">/llm</text>
</svg>
